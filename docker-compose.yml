services:
  app-perf:
    profiles:
      - perf-small
    build:
      context: .
      dockerfile: docker/Dockerfile.perf
    container_name: fastcheck-app-perf
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-perf-small-secret-key-base-perf-small-secret-key-base-1234567890abcd}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-perf-small-encryption-key-perf-small-encryption-key-1234}
      MOBILE_JWT_SECRET: ${MOBILE_JWT_SECRET:-perf-small-mobile-jwt-secret-perf-small-mobile-jwt-secret-1234}
      DATABASE_URL: ecto://postgres:${DB_PASSWORD:-postgres}@postgres:5432/fastcheck_prod
      DATABASE_SSL: "false"
      DOMAIN: localhost
      PORT: 4000
      REDIS_URL: redis://redis:6379
      ENABLE_METRICS: "true"
      MOBILE_SCAN_INGESTION_MODE: redis_authoritative
      RUN_MIGRATIONS: "true"
    networks:
      - fastcheck_network
    cpus: 2.0
    mem_limit: 2g

  perf-proxy:
    profiles:
      - perf-small
    build:
      context: .
      dockerfile: docker/perf-proxy.Dockerfile
    container_name: fastcheck-perf-proxy
    restart: unless-stopped
    depends_on:
      app-perf:
        condition: service_started
    environment:
      PERF_DEVICE_HEADER: x-perf-device-id
      PERF_DEVICE_IP_PREFIX: "10.250"
      PORT: 4100
      TARGET_BASE_URL: http://app-perf:4000
    ports:
      - "4100:4100"
    networks:
      - fastcheck_network

  postgres:
    image: postgres:18-alpine
    container_name: fastcheck-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fastcheck_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastcheck_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastcheck_network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: fastcheck-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: fastcheck_prod

      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
      LOG_CONNECTIONS: 1
      LOG_DISCONNECTIONS: 1
      LOG_POOLER_ERRORS: 1
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fastcheck_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U postgres -d fastcheck_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fastcheck-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastcheck_network

networks:
  fastcheck_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
